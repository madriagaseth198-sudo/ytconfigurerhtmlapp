<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON_OS | AI Game Core</title>
    <style>
        :root { --neon: #39ff14; --cyber-blue: #00f3ff; --danger: #ff0055; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', Courier, monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Auth Overlay */
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { border: 2px solid var(--neon); padding: 30px; background: #111; box-shadow: 0 0 15px var(--neon); text-align: center; }
        input { background: #000; border: 1px solid var(--cyber-blue); color: var(--cyber-blue); padding: 10px; margin: 5px; outline: none; }
        
        /* Layout */
        #sidebar { width: 220px; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #main-stage { flex: 1; padding: 40px; position: relative; overflow-y: auto; }
        .tab-btn { background: none; border: 1px solid #444; color: #888; padding: 12px; cursor: pointer; text-align: left; transition: 0.3s; }
        .tab-btn:hover, .tab-btn.active { border-color: var(--neon); color: var(--neon); box-shadow: inset 0 0 5px var(--neon); }

        /* AI Messenger */
        #chat-log { height: 350px; border: 1px solid #222; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: rgba(255,255,255,0.02); }
        .bubble { padding: 10px; border-radius: 4px; max-width: 80%; line-height: 1.4; }
        .ai { border-left: 3px solid var(--neon); background: rgba(57, 255, 20, 0.1); align-self: flex-start; }
        .user { border-right: 3px solid var(--cyber-blue); background: rgba(0, 243, 255, 0.1); align-self: flex-end; }

        /* Wordle Grid */
        #wordle-board { display: grid; grid-template-rows: repeat(6, 40px); gap: 5px; justify-content: center; margin-top: 20px; }
        .wordle-row { display: grid; grid-template-columns: repeat(5, 40px); gap: 5px; }
        .wordle-tile { border: 1px solid #444; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        .correct { background: var(--neon) !important; color: #000; }
        .present { background: #ffd700 !important; color: #000; }
        .absent { background: #333 !important; }

        .game-panel { display: none; }
        .active-panel { display: block; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title" style="color: var(--neon)">SYSTEM_SIGN_IN</h2>
        <input type="text" id="username" placeholder="USERNAME"><br>
        <input type="password" id="password" placeholder="PASSWORD"><br><br>
        <button class="tab-btn" style="width: 100%" onclick="handleAuth()">EXECUTE</button>
        <p onclick="toggleAuthMode()" style="font-size: 10px; margin-top: 15px; cursor: pointer;">[SWITCH MODE]</p>
    </div>
</div>

<div id="sidebar">
    <h3 style="color: var(--cyber-blue)">NEON_OS v2.6</h3>
    <button class="tab-btn active" onclick="switchTab('ai')">AI INTERROGATOR</button>
    <button class="tab-btn" onclick="switchTab('wordle')">WORDLE_CORE</button>
    <button class="tab-btn" onclick="switchTab('hangman')">HANGMAN_EXE</button>
    <button class="tab-btn" onclick="switchTab('ttt')">TIC_TAC_TOE</button>
    <button onclick="location.reload()" style="margin-top: auto; background: none; border: 1px solid var(--danger); color: var(--danger); padding: 5px;">LOGOUT</button>
</div>

<div id="main-stage">
    <div id="panel-ai" class="game-panel active-panel">
        <h2 style="color: var(--neon)">AI CHARACTER GUESSER</h2>
        <div id="chat-log"></div>
        <div style="margin-top: 10px; display: flex; gap: 5px;">
            <input type="text" id="chat-input" style="flex: 1" placeholder="Type your answer (Yes/No/Maybe)...">
            <button class="tab-btn" onclick="sendChat()">SEND</button>
        </div>
    </div>

    <div id="panel-wordle" class="game-panel">
        <h2 style="color: var(--neon)">WORDLE</h2>
        <div id="wordle-board"></div>
        <div style="text-align: center; margin-top: 20px;">
            <input type="text" id="wordle-input" maxlength="5" style="width: 100px; text-align: center;">
            <button class="tab-btn" onclick="submitWordle()">GUESS</button>
        </div>
    </div>

    <div id="panel-hangman" class="game-panel">
        <h2 style="color: var(--neon)">HANGMAN</h2>
        <h1 id="hangman-display" style="letter-spacing: 10px; text-align: center;">_ _ _ _</h1>
        <p style="text-align: center;">LIVES: <span id="lives-count">6</span></p>
        <div style="text-align: center;">
            <input type="text" id="hang-input" maxlength="1" style="width: 40px; text-align: center;">
            <button class="tab-btn" onclick="guessHangman()">TRY</button>
        </div>
    </div>

    <div id="panel-ttt" class="game-panel">
        <h2 style="color: var(--neon)">TIC_TAC_TOE</h2>
        <div id="ttt-grid" style="display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; justify-content: center;">
            <div onclick="playTTT(0)" class="wordle-tile" style="height: 80px; cursor: pointer;"></div>
            <div onclick="playTTT(1)" class="wordle-tile" style="height: 80px; cursor: pointer;"></div>
            <div onclick="playTTT(2)" class="wordle-tile" style="height: 80px; cursor: pointer;"></div>
            <div onclick="playTTT(3)" class="wordle-tile" style="height: 80px; cursor: pointer;"></div>
            <div onclick="playTTT(4)" class="wordle-tile" style="height: 80px; cursor: pointer;"></div>
            <div onclick="playTTT(5)" class="wordle-tile" style="height: 80px; cursor: pointer;"></div>
            <div onclick="playTTT(6)" class="wordle-tile" style="height: 80px; cursor: pointer;"></div>
            <div onclick="playTTT(7)" class="wordle-tile" style="height: 80px; cursor: pointer;"></div>
            <div onclick="playTTT(8)" class="wordle-tile" style="height: 80px; cursor: pointer;"></div>
        </div>
    </div>
</div>

<script>
    let currentUser = null;
    let isRegistering = false;

    // --- AUTH ---
    function toggleAuthMode() {
        isRegistering = !isRegistering;
        document.getElementById('auth-title').innerText = isRegistering ? "CREATE_USER" : "SYSTEM_SIGN_IN";
    }

    function handleAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return;

        let db = JSON.parse(localStorage.getItem('users_db') || "{}");
        if(isRegistering) {
            db[u] = { password: p, history: [] };
            localStorage.setItem('users_db', JSON.stringify(db));
            alert("Registered successfully!");
        } else {
            if(!db[u] || db[u].password !== p) return alert("ACCESS DENIED");
        }
        currentUser = u;
        document.getElementById('auth-overlay').style.display = 'none';
        loadChat();
        initWordle();
    }

    // --- NAVIGATION ---
    function switchTab(tab) {
        document.querySelectorAll('.game-panel').forEach(p => p.classList.remove('active-panel'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + tab).classList.add('active-panel');
        event.target.classList.add('active');
        if(tab === 'hangman') initHangman();
    }

    // --- AI CHAT (The Interrogator) ---
    const aiQuestions = [
        "Thinking of a character? Is it a human?",
        "Is this character from a live-action series?",
        "Does this character have supernatural abilities?",
        "Is the character part of the Star Wars universe?",
        "Does the character use a Lightsaber?",
        "I'm guessing... Luke Skywalker?"
    ];
    let chatStep = 0;

    function sendChat() {
        const input = document.getElementById('chat-input');
        if(!input.value) return;

        addMessage('user', input.value);
        chatStep++;
        
        setTimeout(() => {
            const nextQ = aiQuestions[chatStep] || "You've bested my logic! Let's start over. Is it human?";
            if(!aiQuestions[chatStep]) chatStep = 0;
            addMessage('ai', nextQ);
        }, 600);
        input.value = "";
    }

    function addMessage(role, text) {
        const log = document.getElementById('chat-log');
        log.innerHTML += `<div class="bubble ${role}">${text}</div>`;
        log.scrollTop = log.scrollHeight;
        
        let db = JSON.parse(localStorage.getItem('users_db'));
        db[currentUser].history.push({role, text});
        localStorage.setItem('users_db', JSON.stringify(db));
    }

    function loadChat() {
        const db = JSON.parse(localStorage.getItem('users_db'));
        const hist = db[currentUser].history;
        if(hist.length === 0) {
            addMessage('ai', aiQuestions[0]);
        } else {
            hist.forEach(m => {
                const log = document.getElementById('chat-log');
                log.innerHTML += `<div class="bubble ${m.role}">${m.text}</div>`;
            });
        }
    }

    // --- WORDLE ---
    let wordleSecret = "CYBER";
    let wordleRow = 0;
    function initWordle() {
        const board = document.getElementById('wordle-board');
        board.innerHTML = "";
        for(let i=0; i<6; i++) {
            let row = document.createElement('div');
            row.className = 'wordle-row';
            for(let j=0; j<5; j++) row.innerHTML += `<div class="wordle-tile" id="w-${i}-${j}"></div>`;
            board.appendChild(row);
        }
    }

    function submitWordle() {
        const input = document.getElementById('wordle-input').value.toUpperCase();
        if(input.length !== 5) return;
        
        for(let i=0; i<5; i++) {
            const tile = document.getElementById(`w-${wordleRow}-${i}`);
            tile.innerText = input[i];
            if(input[i] === wordleSecret[i]) tile.className = "wordle-tile correct";
            else if(wordleSecret.includes(input[i])) tile.className = "wordle-tile present";
            else tile.className = "wordle-tile absent";
        }
        wordleRow++;
        document.getElementById('wordle-input').value = "";
    }

    // --- HANGMAN ---
    let hWord = "PROTOCOL";
    let hGuessed = [];
    let hLives = 6;
    function initHangman() {
        document.getElementById('hangman-display').innerText = hWord.split('').map(l => hGuessed.includes(l) ? l : "_").join(" ");
    }
    function guessHangman() {
        const l = document.getElementById('hang-input').value.toUpperCase();
        if(!hGuessed.includes(l)) {
            hGuessed.push(l);
            if(!hWord.includes(l)) hLives--;
            document.getElementById('lives-count').innerText = hLives;
            initHangman();
        }
        document.getElementById('hang-input').value = "";
    }

    // --- TIC TAC TOE ---
    let tttBoard = ["","","","","","","","",""];
    function playTTT(i) {
        if(tttBoard[i]) return;
        tttBoard[i] = "X";
        event.target.innerText = "X";
        event.target.style.color = "var(--cyber-blue)";
        
        setTimeout(() => {
            let empty = tttBoard.map((v, idx) => v === "" ? idx : null).filter(v => v !== null);
            if(empty.length) {
                let m = empty[Math.floor(Math.random() * empty.length)];
                tttBoard[m] = "O";
                document.getElementById('ttt-grid').children[m].innerText = "O";
                document.getElementById('ttt-grid').children[m].style.color = "var(--neon)";
            }
        }, 400);
    }
</script>
</body>
          </html>
