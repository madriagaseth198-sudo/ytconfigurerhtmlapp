<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON_OS | Gaming AI</title>
    <style>
        :root { --neon: #39ff14; --cyber: #00f3ff; --bg: #0a0a0a; --glass: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Auth Overlay */
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { border: 1px solid var(--cyber); padding: 30px; background: #111; border-radius: 12px; width: 300px; text-align: center; }
        input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        
        /* Layout */
        #sidebar { width: 220px; border-right: 1px solid #222; padding: 15px; display: flex; flex-direction: column; background: #000; }
        #main-stage { flex: 1; padding: 25px; overflow-y: auto; background: #0d0d0d; }
        .nav-btn { background: none; border: 1px solid transparent; color: #888; padding: 10px; cursor: pointer; text-align: left; border-radius: 5px; margin: 2px 0; }
        .nav-btn:hover, .nav-btn.active { background: var(--glass); color: var(--cyber); border-color: var(--cyber); }

        /* Panels */
        .panel { display: none; }
        .panel.active { display: block; }

        /* Chat System */
        .chat-area { height: 300px; border: 1px solid #222; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; margin-bottom: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 80%; font-size: 14px; }
        .ai { background: #1a1a1a; border: 1px solid var(--neon); align-self: flex-start; }
        .user { background: var(--cyber); color: #000; align-self: flex-end; }

        /* Game Grids */
        .ttt-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 5px; justify-content: center; }
        .cell { width: 80px; height: 80px; background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .uno-card { width: 50px; height: 80px; border: 2px solid #fff; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; margin: 5px; font-weight: bold; }
        
        button.action { background: var(--neon); border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 id="auth-title">SIGN UP</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="action" onclick="handleAuth()">CONTINUE</button>
        <p onclick="isLogin = !isLogin; document.getElementById('auth-title').innerText = isLogin ? 'LOG IN' : 'SIGN UP'" style="cursor:pointer; font-size:12px; margin-top:10px;">Switch Mode</p>
    </div>
</div>

<div id="sidebar">
    <h2 style="color:var(--neon)">NEON_OS</h2>
    <div class="nav-btn active" onclick="showPanel('chat')">💬 Message AI</div>
    <div class="nav-btn" onclick="showPanel('guesser')">👤 Character Guesser</div>
    <div class="nav-btn" onclick="showPanel('wordle')">🧩 Wordle</div>
    <div class="nav-btn" onclick="showPanel('hangman')">🪢 Hangman</div>
    <div class="nav-btn" onclick="showPanel('ttt')">⭕ Tic-Tac-Toe</div>
    <div class="nav-btn" onclick="showPanel('uno')">🃏 Uno Card Duel</div>
    <div class="nav-btn" onclick="showPanel('settings')">⚙️ Settings</div>
</div>

<div id="main-stage">
    <div id="panel-chat" class="panel active">
        <h3>AI Messenger</h3>
        <div id="chat-box" class="chat-area"></div>
        <input type="text" id="chat-input" placeholder="Say anything...">
        <button class="action" onclick="sendMessage()">Send to AI</button>
    </div>

    <div id="panel-guesser" class="panel">
        <h3>Character Interrogator</h3>
        <div id="guesser-box" class="chat-area"></div>
        <input type="text" id="guesser-input" placeholder="Yes / No / Maybe...">
        <button class="action" onclick="sendGuess()">Answer AI</button>
    </div>

    <div id="panel-wordle" class="panel">
        <h3>Cyber Wordle (5 Letters)</h3>
        <div id="wordle-display" style="text-align:center; font-size:24px; margin:20px;">_ _ _ _ _</div>
        <input type="text" id="wordle-input" maxlength="5" style="text-align:center;">
        <button class="action" onclick="playWordle()">Guess Word</button>
    </div>

    <div id="panel-hangman" class="panel">
        <h3>Hangman</h3>
        <h2 id="hang-word" style="text-align:center; letter-spacing:10px;">_ _ _ _</h2>
        <p id="hang-status" style="text-align:center;">Lives: 6</p>
        <input type="text" id="hang-input" maxlength="1" style="width:40px; margin:0 auto; display:block;">
        <button class="action" onclick="playHangman()">Guess Letter</button>
    </div>

    <div id="panel-ttt" class="panel">
        <h3>Tic-Tac-Toe vs AI</h3>
        <div class="ttt-grid" id="ttt-board">
            <div class="cell" onclick="tttMove(0)"></div><div class="cell" onclick="tttMove(1)"></div><div class="cell" onclick="tttMove(2)"></div>
            <div class="cell" onclick="tttMove(3)"></div><div class="cell" onclick="tttMove(4)"></div><div class="cell" onclick="tttMove(5)"></div>
            <div class="cell" onclick="tttMove(6)"></div><div class="cell" onclick="tttMove(7)"></div><div class="cell" onclick="tttMove(8)"></div>
        </div>
    </div>

    <div id="panel-uno" class="panel">
        <h3>Uno Duel vs AI</h3>
        <div style="display:flex; justify-content:space-around;">
            <div><h4>AI Hand</h4><div id="ai-uno"></div></div>
            <div><h4>Your Hand</h4><div id="user-uno"></div></div>
        </div>
        <button class="action" onclick="playUno()">Play Round</button>
    </div>

    <div id="panel-settings" class="panel">
        <h3>Settings</h3>
        <input type="password" id="new-pass" placeholder="New Password">
        <button class="action" onclick="changePass()">Change Password</button>
        <br><br>
        <button class="action" style="background:red; color:white;" onclick="location.reload()">Log Out</button>
    </div>
</div>

<script>
    let currentUser = null;
    let isLogin = false;

    // --- AUTH ---
    function handleAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return alert("Enter details");

        let db = JSON.parse(localStorage.getItem('game_db') || "{}");
        if(!isLogin) {
            db[u] = { pass: p, chatHist: [], guessHist: [] };
            localStorage.setItem('game_db', JSON.stringify(db));
            alert("Signed up! Now switch to Log In.");
        } else {
            if(db[u] && db[u].pass === p) {
                currentUser = u;
                document.getElementById('auth-overlay').style.display = 'none';
                loadData();
            } else { alert("Wrong password"); }
        }
    }

    function changePass() {
        let db = JSON.parse(localStorage.getItem('game_db'));
        db[currentUser].pass = document.getElementById('new-pass').value;
        localStorage.setItem('game_db', JSON.stringify(db));
        alert("Password updated");
    }

    // --- NAVIGATION ---
    function showPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('panel-' + id).classList.add('active');
        event.target.classList.add('active');
    }

    // --- CHAT LOGIC ---
    function sendMessage() {
        const val = document.getElementById('chat-input').value;
        if(!val) return;
        addMsg('chat-box', 'user', val);
        
        let response = "That is fascinating. As an AI, I see things through code. Tell me more about " + val;
        if(val.toLowerCase().includes("hello")) response = "Greetings, user! Which game shall we play?";
        
        setTimeout(() => addMsg('chat-box', 'ai', response), 600);
        document.getElementById('chat-input').value = "";
    }

    // --- CHARACTER GUESSER ---
    let qStep = 0;
    const questions = ["Is your character a human?", "Is it a male?", "Is he from a Marvel movie?", "Is it Iron Man?"];
    function sendGuess() {
        const val = document.getElementById('guesser-input').value;
        addMsg('guesser-box', 'user', val);
        qStep++;
        setTimeout(() => {
            let nextQ = questions[qStep] || "I give up! You win. Let's play again. Is it human?";
            if(qStep >= questions.length) qStep = 0;
            addMsg('guesser-box', 'ai', nextQ);
        }, 600);
        document.getElementById('guesser-input').value = "";
    }

    function addMsg(boxId, role, text) {
        const box = document.getElementById(boxId);
        box.innerHTML += `<div class="msg ${role}">${text}</div>`;
        box.scrollTop = box.scrollHeight;
        // Persistence
        let db = JSON.parse(localStorage.getItem('game_db'));
        const key = boxId === 'chat-box' ? 'chatHist' : 'guessHist';
        db[currentUser][key].push({role, text});
        localStorage.setItem('game_db', JSON.stringify(db));
    }

    function loadData() {
        let db = JSON.parse(localStorage.getItem('game_db'))[currentUser];
        db.chatHist.forEach(m => document.getElementById('chat-box').innerHTML += `<div class="msg ${m.role}">${m.text}</div>`);
        db.guessHist.forEach(m => document.getElementById('guesser-box').innerHTML += `<div class="msg ${m.role}">${m.text}</div>`);
        if(db.guessHist.length === 0) addMsg('guesser-box', 'ai', questions[0]);
    }

    // --- TIC TAC TOE ---
    let tttState = Array(9).fill("");
    function tttMove(i) {
        if(tttState[i]) return;
        tttState[i] = "X";
        document.getElementById('ttt-board').children[i].innerText = "X";
        // AI Logic
        setTimeout(() => {
            let empty = tttState.map((s, idx) => s === "" ? idx : null).filter(s => s !== null);
            if(empty.length) {
                let m = empty[Math.floor(Math.random()*empty.length)];
                tttState[m] = "O";
                document.getElementById('ttt-board').children[m].innerText = "O";
                document.getElementById('ttt-board').children[m].style.color = "var(--cyber)";
            }
        }, 400);
    }

    // --- UNO DUEL ---
    function playUno() {
        const colors = ['red', 'blue', 'green', 'yellow'];
        const draw = () => `<div class="uno-card" style="background:${colors[Math.floor(Math.random()*4)]}">${Math.floor(Math.random()*10)}</div>`;
        document.getElementById('ai-uno').innerHTML = draw() + draw();
        document.getElementById('user-uno').innerHTML = draw() + draw();
        alert("The AI played a card! You countered. Round Draw!");
    }

    // --- HANGMAN ---
    let hWord = "NEON";
    function playHangman() {
        let letter = document.getElementById('hang-input').value.toUpperCase();
        if(hWord.includes(letter)) alert("Correct!");
        else alert("Wrong!");
    }

    // --- WORDLE ---
    function playWordle() {
        let guess = document.getElementById('wordle-input').value.toUpperCase();
        if(guess === "CYBER") document.getElementById('wordle-display').innerText = "C Y B E R";
        else alert("Try again!");
    }
</script>
</body>
    </html>
